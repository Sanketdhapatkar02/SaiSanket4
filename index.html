<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sai Sanket Insurance – Trusted LIC, Star Health, Vehicle Insurance & Investment Agent in Thane West.">
    <title>Sai Sanket Insurance – Thane West | LIC · Star Health · Vehicle · SIP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="js/main.js" defer></script>
    <script type="module" src="js/testimonials.js"></script>
</head>
<body>

<section id="testimonials" class="alt">
    <div class="section-inner">
        <div class="section-header">
            <span class="section-tag">Testimonials</span>
            <h2>What Our Clients Say</h2>
        </div>

        <div class="review-form">
            <h3>Leave a Review</h3>
            <input type="text" id="t-name" placeholder="Your Name" required>
            <div class="star-input" id="starInput">
                <span onclick="setRating(1)">★</span>
                <span onclick="setRating(2)">★</span>
                <span onclick="setRating(3)">★</span>
                <span onclick="setRating(4)">★</span>
                <span onclick="setRating(5)">★</span>
            </div>
            <textarea id="t-msg" placeholder="Share your experience..." required></textarea>
            <button class="btn-primary" onclick="submitReview()">Submit Review</button>
        </div>

        <hr>

        <div id="reviewsContainer" class="reviews-grid">
            <p>Loading reviews...</p>
        </div>
    </div>
</section>

</body>
</html>
